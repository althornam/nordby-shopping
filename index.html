<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nordby">

  <link rel="manifest" href="manifest.json">

<body>
<header>
  <div class="top"><h1>Nordby handleliste 🇸🇪</h1><div id="count">0 / 0</div></div>

    <button id="hideDone">Skjul kjøpt</button>

<nav id="tabs"></nav>
<main>
  <section class="route">
    <strong>Anbefalt rute</strong>
    <p>1. MaxiMat – hovedhandel og kjølevarer.</p>
    <p>2. Gottebiten – cherry-brus, snacks og søtt.</p>
    <p>3. SBG – Skruf No. 25.</p>
  </section>
  <div id="list"></div>
</main>
<footer>
  <button id="showAll">Vis alle</button>
  <button id="reset">Nullstill</button>
</footer>
<script src="app.js"></script>
</body>
</html>
